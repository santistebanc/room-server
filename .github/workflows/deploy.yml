name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check if PARTYKIT_TOKEN is set
        run: |
          if [ -z "$PARTYKIT_TOKEN" ]; then
            echo "ERROR: PARTYKIT_TOKEN is not set"
            exit 1
          else
            echo "PARTYKIT_TOKEN is set (length: ${#PARTYKIT_TOKEN})"
          fi
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}

      - name: Verify PartyKit authentication
        run: npx partykit whoami
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}

      - name: Deploy to PartyKit
        run: DEBUG=* npx partykit deploy
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}

      - name: Show server URL
        run: |
          USERNAME=$(npx partykit whoami 2>/dev/null | tr -d '[:space:]')
          echo "Server URL: https://room-server.${USERNAME}.partykit.dev"
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}